<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DramScore - Whisky Tasting</title>
    <link rel="stylesheet" href="style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

    <section id="view-dashboard" class="view">
        <header>
            <img src="https://maxc-the-sox.github.io/whisky-app/logo.png?v=2" alt="App Logo" class="app-logo">
            <h1>🥃 DramScore</h1>
            <p>Deine Tasting-Zentrale</p>
        </header>
        <div class="content">
            <button class="btn-main" onclick="navigateTo('view-setup')">Neues Tasting starten</button>
            <button class="btn-secondary" style="border-color: #666; color: #ccc;" onclick="navigateTo('view-settings')">⚙️ Einstellungen & Backup</button>
            
            <h2 style="margin-top: 30px;">Deine Tastings</h2>
            <div id="tasting-list-container"></div>
        </div>
    </section>

    <section id="view-setup" class="view" style="display: none;">
        <header>
            <button class="btn-back" onclick="navigateTo('view-dashboard')">← Zurück</button>
            <h1>Setup</h1>
        </header>
        <div class="content">
            <label>Name des Tastings</label>
            <input type="text" id="setup-name" placeholder="z.B. Islay vs. Speyside">
            <label>Datum</label>
            <input type="date" id="setup-date">
            
            <label>Teilnehmer hinzufügen</label>
            <datalist id="known-participants"></datalist>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="setup-participant-name" list="known-participants" placeholder="Name">
                <button class="btn-secondary" style="margin-top: 5px; width: auto;" onclick="addParticipant()">Hinzufügen</button>
            </div>
            <ul id="participant-list" class="tag-list"></ul>

            <button class="btn-main" onclick="startTastingGrid()">Zum Tasting-Tisch</button>
        </div>
    </section>

    <section id="view-grid" class="view" style="display: none;">
        <header style="padding-top: 80px;">
            <button class="btn-back" style="top: 15px; background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 8px; white-space: nowrap;" onclick="exitToDashboard()">← Zurück</button>
            <h1 id="grid-title">Live Tasting</h1>
        </header>
        <div class="content">
            <div class="table-container">
                <table id="tasting-table"></table>
            </div>
            <button class="btn-main" onclick="finishAndShowResults()">Tasting beenden & Auswerten</button>
        </div>
    </section>

    <section id="view-results" class="view" style="display: none;">
        <header>
            <h1 style="color: #f1c40f;">🏆 Ergebnisse</h1>
            <p id="results-title">Tasting Name</p>
        </header>
        <div class="content">
            <div id="podium-container"></div>
            <button class="btn-main" onclick="exitToDashboard()">Tasting abschließen</button>
        </div>
    </section>

    <section id="view-settings" class="view" style="display: none;">
        <header>
            <button class="btn-back" onclick="loadDashboard(); navigateTo('view-dashboard')">← Zurück</button>
            <h1>Einstellungen</h1>
        </header>
        <div class="content">
            <h3>💾 Backup & Sync</h3>
            <button class="btn-main" style="background-color: #27ae60;" onclick="exportDatabase()">Datenbank exportieren</button>
            <input type="file" id="import-file" style="display: none;" accept=".json" onchange="importDatabase(event)">
            <button class="btn-secondary" style="border-color: #2980b9; color: #3498db;" onclick="document.getElementById('import-file').click()">📂 Datenbank laden (Import)</button>
            <hr style="border: 1px solid #444; margin: 30px 0;">
            <button class="btn-secondary" style="color: #e74c3c; border-color: #e74c3c;" onclick="clearTastings()">🗑️ Alle Tastings löschen</button>
            <button class="btn-secondary" style="color: #e74c3c; border-color: #e74c3c;" onclick="clearMasterDB()">🗑️ Master-Datenbank leeren</button>
        </div>
    </section>

    <div id="modal-whisky" class="modal">
        <div class="modal-content">
            <h2 id="modal-whisky-title">Whisky eintragen</h2>
            <datalist id="known-whiskies"></datalist>
            <datalist id="known-distilleries"></datalist>
            
            <datalist id="whisky-types">
                <option value="Single Malt Scotch"></option>
                <option value="Blended Malt Scotch"></option>
                <option value="Blended Scotch"></option>
                <option value="Single Pot Still (Irish)"></option>
                <option value="Bourbon"></option>
                <option value="Rye Whiskey"></option>
                <option value="Tennessee Whiskey"></option>
                <option value="Single Grain"></option>
                <option value="Corn Whiskey"></option>
                <option value="Single Malt (Japan)"></option>
                <option value="Single Malt (Deutschland)"></option>
            </datalist>

            <datalist id="countries">
                <option value="Schottland"></option>
                <option value="Irland"></option>
                <option value="USA"></option>
                <option value="Japan"></option>
                <option value="Deutschland"></option>
                <option value="Kanada"></option>
                <option value="Indien"></option>
                <option value="Taiwan"></option>
                <option value="Frankreich"></option>
                <option value="Australien"></option>
                <option value="Schweden"></option>
                <option value="Schweiz"></option>
                <option value="Österreich"></option>
            </datalist>

            <label>Name</label><input type="text" id="w-name" list="known-whiskies" onchange="autoFillWhisky(this)">
            <label>Destille</label><input type="text" id="w-distillery" list="known-distilleries">
            <div style="display: flex; gap: 10px;">
                <div style="flex:1"><label>Art</label><input type="text" id="w-type" list="whisky-types"></div>
                <div style="flex:1"><label>Land</label><input type="text" id="w-country" list="countries"></div>
            </div>
            <div style="display: flex; gap: 10px;">
                <div style="flex:1"><label>Alter</label><input type="number" id="w-age"></div>
                <div style="flex:1"><label>Alk. %</label><input type="number" step="0.1" id="w-abv"></div>
            </div>
            <label>Zu welchem Flight gehört er?</label>
            <input type="number" id="w-flight" value="1" min="1" style="border: 2px solid var(--accent-color);">
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn-secondary" onclick="closeModal('modal-whisky')">Abbrechen</button>
                <button class="btn-main" onclick="saveWhiskyFromModal()">Speichern</button>
            </div>
        </div>
    </div>

    <div id="modal-participant" class="modal">
        <div class="modal-content">
            <h2>Teilnehmer hinzufügen</h2>
            <label>Name</label>
            <input type="text" id="live-participant-name" list="known-participants" placeholder="Name">
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn-secondary" onclick="closeModal('modal-participant')">Abbrechen</button>
                <button class="btn-main" onclick="addLiveParticipant()">Hinzufügen</button>
            </div>
        </div>
    </div>

    <div id="modal-rating" class="modal">
        <div class="modal-content">
            <h2 id="modal-rating-title">Bewertung im Detail</h2>
            <p id="modal-rating-subtitle" style="color: var(--secondary-text); margin-top: -10px;"></p>
            <label>Geruch (Nase) - 0 bis 10</label><input type="number" id="r-nose" step="0.1" min="0" max="10">
            <label>Geschmack - 0 bis 10</label><input type="number" id="r-taste" step="0.1" min="0" max="10">
            <label>Abgang - 0 bis 10</label><input type="number" id="r-finish" step="0.1" min="0" max="10">
            <label>Endwertung - 0 bis 10</label><input type="number" id="r-overall" step="0.1" min="0" max="10">
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn-secondary" onclick="closeModal('modal-rating')">Abbrechen</button>
                <button class="btn-main" onclick="saveRatingFromModal()">Speichern</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
